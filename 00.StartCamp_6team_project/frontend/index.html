<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SeoulMySoulMate</title>
    <meta name="description" content="서울 관광정보 통합, 커뮤니티, 챗봇, 여행코스 플래너" />
    <meta name="theme-color" content="#f5f1e9" />
    <meta property="og:title" content="SeoulMySoulMate" />
    <meta property="og:description" content="서울의 장소를 발견하고 나만의 여행 리듬을 만드는 서비스" />
    <meta property="og:type" content="website" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/favicon.png" />
    <script>
      try {
        const saved = localStorage.getItem('seoulmate.theme')
        document.documentElement.dataset.theme = saved || (matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light')
      } catch (_) {}
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
