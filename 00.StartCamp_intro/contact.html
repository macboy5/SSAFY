         class="fixed bottom-0 left-1/2 -translate-x-1/2 invisible opacity-0 transition-all duration-500 z-50 bg-navy text-white font-bold px-6 py-3 rounded-full shadow-xl whitespace-nowrap">

    <footer class="border-t border-gray-100 text-gray-400 text-center py-8 text-xs">
        <p>© 2026 박성진. All rights reserved.</p>
    </footer>

    <script>
        function copyToClipboard() {
            const email = "sungjinpark0503@gmail.com";
            navigator.clipboard.writeText(email).then(() => {
                showToast();
            });
        }

        function showToast() {
            const toast = document.getElementById("toast");
            toast.classList.remove("invisible", "opacity-0");
            toast.classList.add("opacity-100", "bottom-20");
            setTimeout(() => {
                toast.classList.add("opacity-0", "invisible");
                toast.classList.remove("opacity-100", "bottom-20");
            }, 3000);
        }
    </script>
